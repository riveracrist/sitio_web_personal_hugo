  # Projects
  projects:
    enable: true
    title: "Proyectos Personales"
    items:
      - title: Sitio Web ADSO
        content: Página web creada con Quarto para la tecnología de Análisis y Desarrollo de Software del SENA.
        image: /images/projects/sitioweb.png
        featured:
          name: Ver proyecto
          link: https://riveracrist.github.io/
        badges:
          - "Quarto"
          - "Markdown"

      - title: Tablero de Control
        content: Dashboard interactivo en R (Shiny y shinydashboard) para monitorear el rendimiento diario y evaluar métricas clave de representantes de servicio al cliente, incluyendo desempeño individual y elegibilidad para comisiones.
        image: /images/projects/call_center2.png
        featured:
          name: Ver proyecto
          link: https://m8juuc-riveracrist.shinyapps.io/CallCenterMonitor/
        badges:
          - "Shiny"
          - "Dashboard"
          - "R"

      - title: Tablero de Datos con Arduino
        content: Dashboard que visualiza en tiempo real los datos capturados por sensores conectados y programados con Arduino.
        image: /images/projects/tableroarduino.png
        featured:
          name: Ver proyecto
          link: https://rpubs.com/Semilla_389/1138902
        badges:
          - "Arduino"
          - "Flexdashboard"
          - "R"

      - title: R + RStudio + MySQL
        content: Documento Markdown que demuestra cómo conectarse a una base de datos MySQL desde RStudio para ejecutar consultas y generar visualizaciones gráficas.
        image: /images/projects/rstuio_mysql.png
        featured:
          name: Ver proyecto
          link: https://rpubs.com/Semilla_389/1069870
        badges:
          - "MySQL"
          - "ggplot2"
          - "Markdown"

      - title: Calculadora de Código de Colores para Resistores
        content: Aplicación web alojada en ShinyApps, construida con shinydashboard en R, que permite calcular el valor de resistencia a partir del código de colores de un resistor.
        image: /images/projects/shinydashboard_resistores.png
        featured:
          name: Ver proyecto
          link: https://m8juuc-riveracrist.shinyapps.io/calculadora_resistores/
        badges:
          - "Circuitos"
          - "ShinyApps"
          - "Shinydashboard"
          - "R"

      - title: Cuestionario Interactivo con el Paquete learnr
        content: Herramienta educativa que utiliza el paquete learnr de R para crear tutoriales y cuestionarios interactivos publicados en ShinyApps.
        image: /images/projects/learnr.png
        featured:
          name: Ver proyecto
          link: https://m8juuc-riveracrist.shinyapps.io/Circuitos/
        badges:
          - "learnr"
          - "Educación"
          - "R"

