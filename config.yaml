  # About
  about:
    enable: true
    title: "Conóceme"
    image: "/images/microchip.png"
    content: |-
      Estudiante de Ingeniería en Telecomunicaciones (Universidad de Antioquia) y Tecnología en Análisis y Desarrollo de Software (SENA), con enfoque en ciencia de datos, desarrollo de software y tecnologías de la información y las comunicaciones (TIC).

      Cuento con habilidades en programación en **Python**, **R** y **C++**, lenguajes que he aplicado en análisis de datos, visualización, automatización y desarrollo de soluciones tecnológicas. Tengo habilidades en la gestión y consulta de bases de datos relacionales con **SQL**, incluyendo su uso en la plataforma **Databricks** para el procesamiento y análisis de datos a escala. Complementariamente, manejo el framework **Scrapy** para la extracción automatizada de datos desde la web (*web scraping*).

      Utilizo **Git** para el control de versiones y la gestión de repositorios, lo que me permite colaborar en proyectos de desarrollo de manera ordenada y eficiente.

      Me interesa la intersección entre el hardware y el software: trabajo con plataformas como **Arduino** y **Raspberry Pi** para explorar la electrónica, la automatización y el desarrollo de soluciones IoT.

    skills:
      enable: true
      title: "Otros intereses:"
      items:
